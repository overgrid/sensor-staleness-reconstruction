# Local Kafka broker for `staleness simulate`.
#
# Single-node, KRaft mode (no separate Zookeeper container needed —
# simplest possible setup for local dev/simulation).
#
# Usage:
#   docker compose up -d      # starts the broker in the background
#   docker compose logs -f    # watch broker logs
#   docker compose down       # stop it (add -v to also wipe topic data)
#
# --- Running this unattended, without keeping Docker Desktop's window open ---
# `docker compose up -d` already detaches — closing the terminal (or the
# Docker Desktop window) does NOT stop the broker; only the background
# Docker engine needs to be running, not any GUI window. `restart:
# unless-stopped` below also means the broker container comes back on its
# own after a crash or a host/daemon restart, with no one re-running the
# command by hand.
#   - macOS/Windows: in Docker Desktop's Settings, enable "Start Docker
#     Desktop when you log in" — it then runs as a background/tray
#     process; you can close its window entirely and this broker keeps
#     running as long as your machine is on.
#   - Linux/WSL2: for a setup that survives host reboots with nothing
#     manual at all, skip Docker Desktop and install Docker Engine
#     directly, then `sudo systemctl enable docker` so the daemon itself
#     starts headlessly on boot.
# For running this on a real server unattended long-term, treat it the
# same way as the project's existing "Automation/scheduling" open item —
# a systemd unit (or the eventual self-hosted CI runner) is the natural
# place to own `docker compose up -d`, not a person's laptop.

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: staleness-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # localhost:9092 is correct because the producer/consumer in this
      # project run on the host machine, not inside another container. If
      # a future component (e.g. a dashboard) also runs in Docker, add a
      # second listener on the Docker network name instead of changing this one.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "staleness-pipeline-dev-cluster"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  kafka-data:
